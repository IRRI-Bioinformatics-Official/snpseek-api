name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw        # ← add this step

      - name: Install local JARs to Maven repo
        run: |
          mvn install:install-file -Dfile=lib/fits-1.0.jar -DgroupId=local.libs -DartifactId=fits -Dversion=1.0 -Dpackaging=jar
          mvn install:install-file -Dfile=lib/jarfitsobj-1.0.jar -DgroupId=local.libs -DartifactId=jarfitsobj -Dversion=1.0 -Dpackaging=jar
          mvn install:install-file -Dfile=lib/jarh4obj-1.0.jar -DgroupId=local.libs -DartifactId=jarh4obj -Dversion=1.0 -Dpackaging=jar
          mvn install:install-file -Dfile=lib/jarh5obj-1.0.jar -DgroupId=local.libs -DartifactId=jarh5obj -Dversion=1.0 -Dpackaging=jar
          mvn install:install-file -Dfile=lib/jarhdf-2.11.0.jar -DgroupId=local.libs -DartifactId=jarhdf-2.11 -Dversion=2.11.0 -Dpackaging=jar
          mvn install:install-file -Dfile=lib/jarhdf5-2.10.1.jar -DgroupId=local.libs -DartifactId=jarhdf5-2.10 -Dversion=2.10.1 -Dpackaging=jar
          mvn install:install-file -Dfile=lib/jarhdf5-2.11.0.jar -DgroupId=local.libs -DartifactId=jarhdf5-2.11 -Dversion=2.11.0 -Dpackaging=jar
          mvn install:install-file -Dfile=lib/jarhdfobj-1.0.jar -DgroupId=local.libs -DartifactId=jarhdfobj -Dversion=1.0 -Dpackaging=jar
          mvn install:install-file -Dfile=lib/jarnc2obj-1.0.jar -DgroupId=local.libs -DartifactId=jarnc2obj -Dversion=1.0 -Dpackaging=jar


      - name: Build & Test
        run: ./mvnw clean package 

      - name: Build & Test
        run: ./mvnw clean package 

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy:
    strategy:
      matrix:
        runner: [brs-runner, asti-runner]  # ← add runner matrix
    
    runs-on: 
      - self-hosted
      - ${{ matrix.runner }}

    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Deploy JAR
        run: |
          mv *.jar /opt/snpseek-api/api.jar
          sudo systemctl restart snpseek-api
          sudo systemctl status snpseek-api --no-pager