server:
  port: 5555
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    url: /api-docs
    configUrl: /api-docs/swagger-config
    disable-swagger-default-url: true
    oauth:
      app-name: SNPSeek API Server
      realm: snpseek_realm
      auth-url: https://brs-snpseek.duckdns.org/auth/realms/snpseek_realm/protocol/openid-connect/auth
      token-url: https://brs-snpseek.duckdns.org/auth/realms/snpseek_realm/protocol/openid-connect/token
      client-id: snpseek-api-client
      use-pkce-with-authorization-code-grant: true
      scopes: openid

  servers:
    - public-url: ${APP_PUBLIC_URL:http://localhost:5555}        # ← use env var
      description: Production Server
app:
  public-url: ${APP_PUBLIC_URL:http://localhost:5555}  # Default to localhost if not set

spring:
  application:
    name: SNPSeek-API-Server
  
  # PostgreSQL Configuration
  datasource:
    url: ${DB_URL}
    username:  ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
    # Connection pool settings (HikariCP)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
# SECURITY CONFIG (Ready for Keycloak)
  security:
    oauth2:
      resourceserver:
        jwt:
          # The URL of your new Keycloak Realm
          # Note: Replace 'snpseek' with the Realm Name you created in Keycloak
          issuer-uri: https://brs-snpseek.duckdns.org/auth/realms/snpseek_realm
          # This ensures Spring verifies the "iss" claim in the token
          jwk-set-uri: https://brs-snpseek.duckdns.org/auth/realms/snpseek_realm/protocol/openid-connect/certs
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none  # CHANGED from create-drop for production
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true
  
  # Remove H2 console config
  # h2:
  #   console:
  #     enabled: true
bucket4j:
  methods:
    - filter-order: 1
      execute-condition: "true"
      cache-name: buckets
      rate-limit:
        - bandwidths:
          - capacity: 5
            time: 1
            unit: minutes
            strategy: first
            key-source: IP
logging:
  level:
    org.springframework.web: INFO
    org.irri.snpseek: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
